<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'pt' }}" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  {% seo %}

  <!-- Google Fonts: Archivo Narrow + IBM Plex Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:ital,wght@0,400;0,500;0,700;0,800;1,400&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Preload cursor SVG -->
  <link rel="preload" href="{{ '/assets/svg/cursor-reticle.svg' | relative_url }}" as="image" type="image/svg+xml">

  {% if page.canonical_url %}
  <link rel="canonical" href="{{ page.canonical_url }}">
  {% endif %}

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
</head>
<body class="custom-cursor" data-lang="{{ page.lang | default: site.lang | default: 'pt' }}">

  {% assign t = site.data.translations[page.lang | default: site.lang | default: 'pt'] %}

  <!-- Skip Link -->
  <a href="#main-content" class="skip-link">{{ t.meta.skip_link }}</a>

  <!-- Cursor personalizado -->
  {% include cursor.html %}

  <!-- Overlay mobile nav -->
  <div class="nav-overlay" id="nav-overlay" aria-hidden="true"></div>

  <!-- Hamburger mobile -->
  <button class="hamburger" id="hamburger" aria-label="Abrir navegação" aria-expanded="false" aria-controls="sidebar">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="site-wrapper">

    <!-- Sidebar principal -->
    {% include sidebar.html %}

    <!-- Conteúdo principal -->
    <div class="main-content">
      <main id="main-content" tabindex="-1">
        {{ content }}
      </main>

      <!-- Footer -->
      {% include footer.html %}
    </div>

  </div>

  <!-- Carimbo verificado (global) -->
  {% include stamp.html %}

  <!-- Scripts -->
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/sidebar.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/scroll-reveal.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/cursor.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/lang-switch.js' | relative_url }}" defer></script>

  <!-- No-JS fallback remove -->
  <script>document.documentElement.classList.remove('no-js');</script>

</body>
</html>
