<!-- Cursor personalizado — retículo de engenheiro -->
<div class="custom-cursor-el" id="custom-cursor" aria-hidden="true">
  <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
    <!-- Linha horizontal -->
    <line x1="0" y1="10" x2="8" y2="10" stroke="#B7410E" stroke-width="1"/>
    <line x1="12" y1="10" x2="20" y2="10" stroke="#B7410E" stroke-width="1"/>
    <!-- Linha vertical -->
    <line x1="10" y1="0" x2="10" y2="8" stroke="#B7410E" stroke-width="1"/>
    <line x1="10" y1="12" x2="10" y2="20" stroke="#B7410E" stroke-width="1"/>
    <!-- Círculo central vazado -->
    <circle cx="10" cy="10" r="2" fill="none" stroke="#B7410E" stroke-width="1"/>
    <!-- Quadrado externo -->
    <rect x="1" y="1" width="18" height="18" fill="none" stroke="#B7410E" stroke-width="0.5" opacity="0.4"/>
  </svg>
</div>

<!-- Cursor sobre imagem — com ângulos de visor -->
<div class="custom-cursor-img" id="custom-cursor-img" aria-hidden="true">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
    <line x1="0" y1="12" x2="10" y2="12" stroke="#B7410E" stroke-width="1"/>
    <line x1="14" y1="12" x2="24" y2="12" stroke="#B7410E" stroke-width="1"/>
    <line x1="12" y1="0" x2="12" y2="10" stroke="#B7410E" stroke-width="1"/>
    <line x1="12" y1="14" x2="12" y2="24" stroke="#B7410E" stroke-width="1"/>
    <circle cx="12" cy="12" r="2.5" fill="none" stroke="#B7410E" stroke-width="1"/>
    <!-- Ângulos de visor de câmara -->
    <path d="M2,2 L6,2 L2,6" fill="none" stroke="#B7410E" stroke-width="1"/>
    <path d="M22,2 L18,2 L22,6" fill="none" stroke="#B7410E" stroke-width="1"/>
    <path d="M2,22 L6,22 L2,18" fill="none" stroke="#B7410E" stroke-width="1"/>
    <path d="M22,22 L18,22 L22,18" fill="none" stroke="#B7410E" stroke-width="1"/>
  </svg>
</div>

<style>
.custom-cursor-el,
.custom-cursor-img {
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  transition: opacity 200ms;
  opacity: 0;
  mix-blend-mode: normal;
}

body.custom-cursor .custom-cursor-el {
  opacity: 1;
}
</style>
