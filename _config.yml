lang: "pt"
timezone: "Europe/Lisbon"

# Plugins compatíveis com GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

collections:
  books:
    output: true
    permalink: /livros/:slug/
  articles:
    output: true
    permalink: /artigos/:slug/
  chapters:
    output: true
    permalink: /capitulos/:slug/
  projects:
    output: true
    permalink: /projectos/:slug/

defaults:
  - scope:
      path: ""
      type: "books"
    values:
      layout: "publication"
      pub_type: "book"
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "publication"
      pub_type: "article"
  - scope:
      path: ""
      type: "chapters"
    values:
      layout: "publication"
      pub_type: "chapter"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  auto_ids: true
  hard_wrap: false

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .git
  - vendor
